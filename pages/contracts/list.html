<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contratos — upmobb</title>
  <link rel="stylesheet" href="../../style/base.css">
  <link rel="stylesheet" href="../../style/components.css">
  <link rel="stylesheet" href="../../style/contracts.css">
</head>
<body>

  <nav class="app-nav">
    <div class="app-nav__brand">upmobb</div>
    <ul class="app-nav__links">
      <li><a href="/pages/dashboard/index.html" data-page="dashboard">Dashboard</a></li>
      <li><a href="/pages/contracts/list.html"  data-page="contratos">Contratos</a></li>
      <li><a href="/pages/templates/index.html" data-page="templates">Templates</a></li>
    </ul>
  </nav>

  <main class="app-main">

    <header class="page-header">
      <h1 class="page-title">Contratos</h1>
    </header>

    <section class="contracts-filters">
      <input
        type="search"
        id="search"
        class="form-input"
        placeholder="Buscar por contratante, documento ou modelo"
      >
      <select id="filter-status" class="form-select">
        <option value="">Todos os status</option>
        <option value="nao_enviado">Não enviado</option>
        <option value="aguardando_assinatura">Aguardando assinatura</option>
        <option value="assinado">Assinado</option>
        <option value="cancelado">Cancelado</option>
      </select>
      <button class="btn-primary" id="btn-new">Novo contrato</button>
    </section>

    <div id="error-banner" class="error-banner hidden">
      <span id="error-message"></span>
      <button class="btn-link" id="btn-retry">Tentar novamente</button>
    </div>

    <div class="table-wrapper">
      <table class="table" id="contracts-table">
        <thead>
          <tr>
            <th class="sortable" data-field="modelo" aria-sort="none">
              Modelo <span class="sort-indicator"></span>
            </th>
            <th class="sortable" data-field="contratante" aria-sort="none">
              Contratante <span class="sort-indicator"></span>
            </th>
            <th>Documento</th>
            <th>Endereço</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
      </table>
    </div>

    <nav class="pagination" id="pagination">
      <button class="btn-secondary" id="btn-prev">Anterior</button>
      <span class="pagination__info" id="pagination-info"></span>
      <button class="btn-secondary" id="btn-next">Próximo</button>
    </nav>

  </main>

  <!-- Modal: Detalhes -->
  <dialog id="dialog-details" class="modal">
    <div class="modal__header">
      <span>Detalhes do contrato</span>
      <button class="modal__close" id="btn-close-details" aria-label="Fechar">&times;</button>
    </div>
    <div class="modal__body" id="details-body">
    </div>
  </dialog>

  <!-- Modal: Prévia -->
  <dialog id="dialog-preview" class="modal modal--wide">
    <div class="modal__header">
      <span>Prévia do contrato</span>
      <button class="modal__close" id="btn-close-preview" aria-label="Fechar">&times;</button>
    </div>
    <div class="modal__body preview-body" id="preview-body">
    </div>
  </dialog>

  <!-- Modal: Formulário -->
  <dialog id="dialog-form" class="modal">
    <div class="modal__header">
      <span id="form-title">Novo contrato</span>
      <button class="modal__close" id="btn-close-form" aria-label="Fechar">&times;</button>
    </div>
    <form id="contract-form" novalidate>
      <div class="modal__body">

        <div class="form-error hidden" id="form-error"></div>

        <div class="form-group hidden" id="form-group-status">
          <label class="form-label" for="f-status">Status</label>
          <select id="f-status" name="status" class="form-select">
            <option value="nao_enviado">Não enviado</option>
            <option value="aguardando_assinatura">Aguardando assinatura</option>
            <option value="assinado">Assinado</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="f-modelo">Modelo <span class="required">*</span></label>
          <select id="f-modelo" name="modelo" class="form-select" required>
            <option value="">Selecione um modelo</option>
            <option value="Prestação de Serviços">Prestação de Serviços</option>
            <option value="Locação Residencial">Locação Residencial</option>
            <option value="NDA">NDA</option>
            <option value="Compra e Venda">Compra e Venda</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="f-contratante">Nome do contratante <span class="required">*</span></label>
          <input type="text" id="f-contratante" name="contratante" class="form-input" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-tipo-documento">Tipo de documento <span class="required">*</span></label>
            <select id="f-tipo-documento" name="tipoDocumento" class="form-select" required>
              <option value="">Selecione</option>
              <option value="CPF">CPF</option>
              <option value="CNPJ">CNPJ</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-documento">Documento <span class="required">*</span></label>
            <input type="text" id="f-documento" name="documento" class="form-input" inputmode="numeric" maxlength="18" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="f-email">E-mail <span class="required">*</span></label>
          <input type="email" id="f-email" name="email" class="form-input" required>
        </div>

        <div class="form-row">
          <div class="form-group form-group--sm">
            <label class="form-label" for="f-cep">CEP <span class="required">*</span></label>
            <input type="text" id="f-cep" name="cep" class="form-input" inputmode="numeric" maxlength="9" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-endereco">Endereço <span class="required">*</span></label>
            <input type="text" id="f-endereco" name="endereco" class="form-input" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group form-group--sm">
            <label class="form-label" for="f-numero">Número <span class="required">*</span></label>
            <input type="text" id="f-numero" name="numero" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-bairro">Bairro <span class="required">*</span></label>
            <input type="text" id="f-bairro" name="bairro" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-cidade">Cidade <span class="required">*</span></label>
            <input type="text" id="f-cidade" name="cidade" class="form-input" required>
          </div>
          <div class="form-group form-group--xs">
            <label class="form-label" for="f-uf">UF <span class="required">*</span></label>
            <select id="f-uf" name="uf" class="form-select" required>
              <option value="">UF</option>
              <option value="AC">AC</option>
              <option value="AL">AL</option>
              <option value="AP">AP</option>
              <option value="AM">AM</option>
              <option value="BA">BA</option>
              <option value="CE">CE</option>
              <option value="DF">DF</option>
              <option value="ES">ES</option>
              <option value="GO">GO</option>
              <option value="MA">MA</option>
              <option value="MT">MT</option>
              <option value="MS">MS</option>
              <option value="MG">MG</option>
              <option value="PA">PA</option>
              <option value="PB">PB</option>
              <option value="PR">PR</option>
              <option value="PE">PE</option>
              <option value="PI">PI</option>
              <option value="RJ">RJ</option>
              <option value="RN">RN</option>
              <option value="RS">RS</option>
              <option value="RO">RO</option>
              <option value="RR">RR</option>
              <option value="SC">SC</option>
              <option value="SP">SP</option>
              <option value="SE">SE</option>
              <option value="TO">TO</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="f-conteudo">Conteúdo do contrato</label>
          <textarea id="f-conteudo" name="conteudo" class="form-input form-textarea" rows="8" placeholder="Texto do contrato em parágrafos."></textarea>
        </div>

      </div>
      <div class="modal__footer">
        <button type="button" class="btn-secondary" id="btn-cancel-form">Cancelar</button>
        <button type="submit" class="btn-primary" id="btn-submit">Salvar contrato</button>
      </div>
    </form>
  </dialog>

  <!-- Modal: Confirmação de exclusão -->
  <dialog id="dialog-confirm" class="modal modal--sm">
    <div class="modal__header">
      <span>Excluir contrato</span>
      <button class="modal__close" id="btn-close-confirm" aria-label="Fechar">&times;</button>
    </div>
    <div class="modal__body">
      <p id="confirm-message" class="confirm-message"></p>
    </div>
    <div class="modal__footer">
      <button type="button" class="btn-secondary" id="btn-cancel-delete">Cancelar</button>
      <button type="button" class="btn-danger" id="btn-confirm-delete">Excluir</button>
    </div>
  </dialog>

  <script type="module" src="../../scripts/contracts/list.js"></script>
</body>
</html>
