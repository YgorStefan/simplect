<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — simplect</title>
  <link rel="stylesheet" href="../../style/base.css">
  <link rel="stylesheet" href="../../style/components.css">
  <link rel="stylesheet" href="../../style/dashboard.css">
</head>
<body>

  <nav class="app-nav" aria-label="Navegação principal">
    <div class="app-nav__brand">simplect</div>
    <ul class="app-nav__links">
      <li><a href="/pages/dashboard/index.html" data-page="dashboard">Dashboard</a></li>
      <li><a href="/pages/contracts/list.html"  data-page="contratos">Contratos</a></li>
      <li><a href="/pages/templates/index.html" data-page="templates">Templates</a></li>
      <li><a href="/pages/admin/index.html"     data-page="admin">Admin</a></li>
    </ul>
    <div class="app-nav__user" id="nav-user"></div>
  </nav>

  <main class="app-main">

    <header class="page-header">
      <h1 class="page-title">Dashboard</h1>
    </header>

    <div id="kpi-grid" class="kpi-grid">
      <!-- preenchido por JS -->
    </div>

    <section class="dashboard-section">
      <div class="section-header">
        <h2 class="section-title">Contratos recentes</h2>
        <a href="/pages/contracts/list.html" class="link-muted">Ver todos →</a>
      </div>
      <div class="table-wrapper">
        <table class="table" id="recent-table">
          <thead>
            <tr>
              <th>Contratante</th>
              <th>Modelo</th>
              <th>Status</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="recent-body"></tbody>
        </table>
      </div>
    </section>

  </main>

  <script type="module" src="../../scripts/dashboard/dashboard.js"></script>
</body>
</html>
